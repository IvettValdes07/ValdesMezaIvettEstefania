<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 5 - Comunicaciones SMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #ff9500; min-height: 100vh; padding: 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #ff950044; padding-bottom: 8px; }
    .subtitle { font-size: 0.75rem; color: #ff950066; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 0.75rem; color: #ff950088; margin-bottom: 4px; letter-spacing: 1px; }
    input, textarea, select { background: transparent; border: 1px solid #ff950044; color: #ff9500; padding: 8px 12px; font-family: inherit; font-size: 0.85rem; width: 100%; max-width: 380px; }
    textarea { height: 80px; resize: vertical; }
    input::placeholder, textarea::placeholder { color: #ff950044; }
    select { background: #0a0a0a; cursor: pointer; }
    select option { background: #111; }
    .button-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    button { background: transparent; border: 1px solid #ff9500; color: #ff9500; padding: 8px 18px; cursor: pointer; font-family: inherit; font-size: 0.82rem; letter-spacing: 1px; transition: all 0.2s; }
    button:hover { background: #ff950022; }
    button.primary { border-color: #ff9500; background: #ff950022; }
    .msg-log { margin-top: 16px; border: 1px solid #ff950022; border-radius: 4px; padding: 12px; max-height: 260px; overflow-y: auto; }
    .msg-log-title { font-size: 0.8rem; color: #ff950088; margin-bottom: 10px; }
    .msg-bubble { margin-bottom: 12px; display: flex; flex-direction: column; align-items: flex-end; }
    .msg-bubble.received { align-items: flex-start; }
    .bubble-body { background: #ff950022; border: 1px solid #ff950044; padding: 8px 12px; border-radius: 12px 12px 2px 12px; max-width: 90%; font-size: 0.82rem; line-height: 1.4; }
    .msg-bubble.received .bubble-body { border-radius: 12px 12px 12px 2px; background: #1a1a1a; }
    .bubble-meta { font-size: 0.68rem; color: #ff950066; margin-top: 3px; }
    .status-bar { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 0.78rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .api-payload { background: #111; border: 1px solid #ff950022; padding: 10px; border-radius: 4px; font-size: 0.72rem; color: #ff950088; margin-top: 12px; white-space: pre; overflow-x: auto; }
    .char-count { font-size: 0.72rem; color: #ff950066; text-align: right; max-width: 380px; }
    .template-chip { background: #ff950011; border: 1px solid #ff950033; padding: 4px 10px; font-size: 0.72rem; cursor: pointer; border-radius: 2px; margin: 2px; display: inline-block; }
    .template-chip:hover { background: #ff950022; }
  </style>
</head>
<body>
  <h1>📨 API 5 — Comunicaciones</h1>
  <p class="subtitle">Simulación de envío SMS / Notificaciones via protocolo HTTP REST (Twilio-style API)</p>

  <div class="form-group">
    <label>NÚMERO DESTINO</label>
    <input id="toPhone" type="tel" placeholder="+52 555 123 4567" value="+52 844 100 0000">
  </div>
  <div class="form-group">
    <label>REMITENTE</label>
    <select id="fromPhone">
      <option value="+1 415 000 0001">+1 415 000 0001 (Twilio Demo)</option>
      <option value="+52 800 000 0001">+52 800 000 0001 (MX Demo)</option>
      <option value="SISTEMA">SISTEMA (Alfanumérico)</option>
    </select>
  </div>
  <div class="form-group">
    <label>TIPO DE MENSAJE</label>
    <select id="msgType" onchange="updateTemplate()">
      <option value="sms">SMS Regular</option>
      <option value="otp">Código OTP</option>
      <option value="alerta">Alerta / Notificación</option>
      <option value="marketing">Marketing</option>
    </select>
  </div>
  <div class="form-group">
    <label>MENSAJE</label>
    <textarea id="msgBody" placeholder="Escribe tu mensaje SMS..." oninput="updateCharCount()">Tu código de verificación es: 847291. Válido por 5 minutos.</textarea>
    <div class="char-count" id="charCount">0/160 caracteres</div>
  </div>
  <div style="margin-bottom:12px;">
    <div style="font-size:0.72rem; color:#ff950066; margin-bottom:6px;">PLANTILLAS RÁPIDAS:</div>
    <span class="template-chip" onclick="setTemplate('otp')">🔐 OTP</span>
    <span class="template-chip" onclick="setTemplate('bienvenida')">👋 Bienvenida</span>
    <span class="template-chip" onclick="setTemplate('alerta')">⚠️ Alerta</span>
    <span class="template-chip" onclick="setTemplate('promo')">🎁 Promoción</span>
  </div>

  <div class="button-row">
    <button class="primary" onclick="sendSMS()">📤 Enviar SMS</button>
    <button onclick="sendBulk()">📨 Envío Masivo (3)</button>
    <button onclick="simulateIncoming()">📥 Simular Respuesta</button>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    <span id="connectionStatus">Conectado a Twilio API (modo demo)</span>
  </div>

  <div class="msg-log" id="msgLog">
    <div class="msg-log-title">📱 Historial de mensajes:</div>
  </div>

  <div class="api-payload" id="apiPayload">// El payload de la API aparecerá aquí...</div>

  <script>
    let msgCount = 0;

    const templates = {
      otp: 'Tu código de verificación es: {{OTP}}. Válido por 5 minutos. No lo compartas.',
      bienvenida: '¡Bienvenido/a a nuestro servicio! Tu cuenta ha sido creada exitosamente. Visita nuestra app para comenzar.',
      alerta: '⚠️ ALERTA: Se detectó actividad inusual en tu cuenta. Si no fuiste tú, llama al 800-000-0001 inmediatamente.',
      promo: '🎁 ¡Oferta especial! 30% de descuento en tu próxima compra. Usa el código SAVE30. Válido hasta el 31/12. Responde STOP para cancelar.'
    };

    function setTemplate(type) {
      let msg = templates[type];
      if (type === 'otp') msg = msg.replace('{{OTP}}', Math.floor(100000 + Math.random() * 900000));
      document.getElementById('msgBody').value = msg;
      updateCharCount();
    }

    function updateTemplate() {
      const type = document.getElementById('msgType').value;
      if (templates[type]) setTemplate(type);
    }

    function updateCharCount() {
      const len = document.getElementById('msgBody').value.length;
      document.getElementById('charCount').textContent = `${len}/160 caracteres${len > 160 ? ' (2 SMS)' : ''}`;
    }

    function generateSID() {
      return 'SM' + Math.random().toString(36).substring(2, 34).toUpperCase();
    }

    function sendSMS(customTo = null, customMsg = null) {
      const to = customTo || document.getElementById('toPhone').value;
      const from = document.getElementById('fromPhone').value;
      const body = customMsg || document.getElementById('msgBody').value;
      const sid = generateSID();
      const timestamp = new Date().toISOString();

      const payload = {
        api: 'Twilio REST API v2010-04-01',
        endpoint: 'POST /2010-04-01/Accounts/{AccountSid}/Messages.json',
        request: { To: to, From: from, Body: body },
        response: {
          sid,
          status: 'queued',
          date_created: timestamp,
          direction: 'outbound-api',
          num_segments: body.length > 160 ? '2' : '1',
          price: body.length > 160 ? '-0.0150' : '-0.0075',
          price_unit: 'USD'
        }
      };

      document.getElementById('apiPayload').textContent = JSON.stringify(payload, null, 2);

      addBubble(body, to, timestamp, sid, 'sent');
      document.getElementById('connectionStatus').textContent = `✅ SMS enviado — SID: ${sid.substring(0, 16)}...`;

      msgCount++;
    }

    function sendBulk() {
      const numbers = ['+52 844 200 0001', '+52 844 200 0002', '+52 844 200 0003'];
      const msg = document.getElementById('msgBody').value;
      numbers.forEach((n, i) => setTimeout(() => sendSMS(n, msg), i * 800));
    }

    function simulateIncoming() {
      const responses = [
        'Gracias, recibí el código.',
        'STOP',
        '¿Cuánto tiempo es válido?',
        'OK, entendido. Gracias.'
      ];
      const msg = responses[Math.floor(Math.random() * responses.length)];
      const from = document.getElementById('toPhone').value;
      addBubble(msg, from, new Date().toISOString(), generateSID(), 'received');
    }

    function addBubble(body, contact, timestamp, sid, direction) {
      const log = document.getElementById('msgLog');
      const bubble = document.createElement('div');
      bubble.className = `msg-bubble ${direction === 'received' ? 'received' : ''}`;
      bubble.innerHTML = `
        <div class="bubble-body">${body}</div>
        <div class="bubble-meta">${direction === 'sent' ? '📤 Para' : '📥 De'}: ${contact} · ${new Date(timestamp).toLocaleTimeString()}</div>
        <div class="bubble-meta">SID: ${sid.substring(0, 20)}...</div>
      `;
      log.appendChild(bubble);
      log.scrollTop = log.scrollHeight;
    }

    updateCharCount();
    // Demo message on load
    addBubble('Sistema SMS iniciado. Listo para enviar mensajes.', 'SISTEMA', new Date().toISOString(), generateSID(), 'received');
  </script>
</body>
</html>
