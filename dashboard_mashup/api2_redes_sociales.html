<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 2 - Redes Sociales</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #ff6b9d; min-height: 100vh; padding: 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #ff6b9d44; padding-bottom: 8px; }
    .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    input { background: transparent; border: 1px solid #ff6b9d44; color: #ff6b9d; padding: 8px 12px; font-family: inherit; font-size: 0.85rem; width: 200px; }
    input::placeholder { color: #ff6b9d55; }
    button { background: transparent; border: 1px solid #ff6b9d; color: #ff6b9d; padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 0.85rem; letter-spacing: 1px; transition: all 0.2s; }
    button:hover { background: #ff6b9d22; }
    .profile-card { border: 1px solid #ff6b9d44; padding: 16px; border-radius: 4px; display: none; margin-bottom: 16px; }
    .profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff6b9d; object-fit: cover; }
    .profile-name { font-size: 1.1rem; font-weight: bold; }
    .profile-handle { color: #ff6b9d88; font-size: 0.85rem; }
    .stats { display: flex; gap: 20px; margin-bottom: 12px; }
    .stat { text-align: center; }
    .stat-num { font-size: 1.2rem; font-weight: bold; }
    .stat-label { font-size: 0.7rem; color: #ff6b9d88; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .post { border: 1px solid #ff6b9d22; padding: 12px; border-radius: 4px; font-size: 0.8rem; line-height: 1.5; }
    .post-meta { color: #ff6b9d66; font-size: 0.72rem; margin-top: 8px; }
    .post-likes { color: #ff6b9d; font-size: 0.75rem; }
    #status { color: #ff6b9d88; font-size: 0.8rem; min-height: 20px; }
    .tag { background: #ff6b9d22; padding: 2px 8px; font-size: 0.72rem; border-radius: 2px; display: inline-block; margin: 2px; }
  </style>
</head>
<body>
  <h1>📱 API 2 — Redes Sociales</h1>
  <div class="controls">
    <input id="userInput" type="text" placeholder="Usuario (ej: octocat)" value="octocat">
    <button onclick="fetchProfile()">🔍 Buscar Perfil</button>
    <button onclick="loadDemoUsers()">👥 Usuarios Demo</button>
  </div>
  <div id="status">Listo. Ingresa un usuario de GitHub para buscar perfil...</div>

  <div class="profile-card" id="profileCard">
    <div class="profile-header">
      <img class="avatar" id="avatar" src="" alt="avatar">
      <div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-handle" id="profileHandle">—</div>
        <div style="font-size:0.78rem; color:#ff6b9d88; margin-top:4px;" id="profileBio">—</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="statRepos">0</div><div class="stat-label">REPOS</div></div>
      <div class="stat"><div class="stat-num" id="statFollowers">0</div><div class="stat-label">SEGUIDORES</div></div>
      <div class="stat"><div class="stat-num" id="statFollowing">0</div><div class="stat-label">SIGUIENDO</div></div>
    </div>
    <div style="font-size:0.78rem; color:#ff6b9d88; margin-bottom:10px;">📂 Repositorios recientes:</div>
    <div class="posts-grid" id="postsGrid"></div>
  </div>

  <script>
    const DEMO_USERS = ['octocat', 'torvalds', 'gvanrossum', 'mojombo'];

    async function fetchProfile() {
      const user = document.getElementById('userInput').value.trim() || 'octocat';
      const status = document.getElementById('status');
      status.textContent = `Conectando con API de GitHub para @${user}...`;

      try {
        const [profileRes, reposRes] = await Promise.all([
          fetch(`https://api.github.com/users/${user}`),
          fetch(`https://api.github.com/users/${user}/repos?sort=updated&per_page=6`)
        ]);

        if (!profileRes.ok) throw new Error('Usuario no encontrado');

        const profile = await profileRes.json();
        const repos = await reposRes.json();

        document.getElementById('avatar').src = profile.avatar_url;
        document.getElementById('profileName').textContent = profile.name || profile.login;
        document.getElementById('profileHandle').textContent = `@${profile.login} · GitHub`;
        document.getElementById('profileBio').textContent = profile.bio || 'Sin biografía';
        document.getElementById('statRepos').textContent = profile.public_repos;
        document.getElementById('statFollowers').textContent = profile.followers;
        document.getElementById('statFollowing').textContent = profile.following;

        const grid = document.getElementById('postsGrid');
        grid.innerHTML = repos.map(r => `
          <div class="post">
            <div style="font-weight:bold; margin-bottom:4px;">📁 ${r.name}</div>
            <div>${r.description || 'Sin descripción'}</div>
            <div class="post-meta">
              ${r.language ? `<span class="tag">${r.language}</span>` : ''}
            </div>
            <div class="post-likes">⭐ ${r.stargazers_count} &nbsp; 🍴 ${r.forks_count}</div>
          </div>
        `).join('');

        document.getElementById('profileCard').style.display = 'block';
        status.textContent = `✅ Perfil de @${user} cargado exitosamente desde GitHub API`;
      } catch (e) {
        status.textContent = `❌ Error: ${e.message}`;
      }
    }

    function loadDemoUsers() {
      const user = DEMO_USERS[Math.floor(Math.random() * DEMO_USERS.length)];
      document.getElementById('userInput').value = user;
      fetchProfile();
    }

    // Auto-load on start
    fetchProfile();
  </script>
</body>
</html>
