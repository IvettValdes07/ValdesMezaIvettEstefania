<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 3 - E-commerce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #ffd700; min-height: 100vh; padding: 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #ffd70044; padding-bottom: 8px; }
    .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    input { background: transparent; border: 1px solid #ffd70044; color: #ffd700; padding: 8px 12px; font-family: inherit; font-size: 0.85rem; width: 200px; }
    input::placeholder { color: #ffd70055; }
    select { background: #0a0a0a; border: 1px solid #ffd70044; color: #ffd700; padding: 8px 12px; font-family: inherit; font-size: 0.85rem; cursor: pointer; }
    button { background: transparent; border: 1px solid #ffd700; color: #ffd700; padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 0.85rem; letter-spacing: 1px; transition: all 0.2s; }
    button:hover { background: #ffd70022; }
    #status { color: #ffd70088; font-size: 0.8rem; margin-bottom: 12px; min-height: 20px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .product-card { border: 1px solid #ffd70033; padding: 12px; border-radius: 4px; transition: border-color 0.2s; cursor: pointer; }
    .product-card:hover { border-color: #ffd700; }
    .product-img { width: 100%; height: 120px; object-fit: contain; background: #111; border-radius: 2px; margin-bottom: 8px; }
    .product-name { font-size: 0.75rem; margin-bottom: 6px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-price { font-size: 1rem; font-weight: bold; color: #ffd700; }
    .product-rating { font-size: 0.7rem; color: #ffd70088; margin-top: 4px; }
    .product-cat { font-size: 0.68rem; color: #ffd70066; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .cart { border: 1px solid #ffd70044; padding: 12px; margin-top: 16px; border-radius: 4px; }
    .cart-title { font-size: 0.9rem; margin-bottom: 8px; }
    .cart-item { font-size: 0.78rem; display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #ffd70011; }
    .cart-total { font-size: 1rem; font-weight: bold; margin-top: 8px; text-align: right; }
  </style>
</head>
<body>
  <h1>🛒 API 3 — E-Commerce</h1>
  <div class="controls">
    <input id="searchInput" type="text" placeholder="Buscar producto...">
    <select id="categorySelect" onchange="filterProducts()">
      <option value="">Todas las categorías</option>
      <option value="electronics">Electrónicos</option>
      <option value="jewelery">Joyería</option>
      <option value="men's clothing">Ropa Hombre</option>
      <option value="women's clothing">Ropa Mujer</option>
    </select>
    <button onclick="filterProducts()">🔍 Buscar</button>
    <button onclick="loadProducts()">🔄 Recargar</button>
  </div>
  <div id="status">Cargando catálogo de FakeStore API...</div>
  <div class="products-grid" id="productsGrid"></div>

  <div class="cart" id="cart" style="display:none;">
    <div class="cart-title">🛒 Carrito de Compras</div>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Total: $0.00</div>
    <button onclick="clearCart()" style="margin-top:8px; font-size:0.75rem;">🗑️ Vaciar Carrito</button>
  </div>

  <script>
    let allProducts = [];
    let cart = [];

    async function loadProducts() {
      document.getElementById('status').textContent = 'Conectando con FakeStore API...';
      try {
        const res = await fetch('https://fakestoreapi.com/products');
        allProducts = await res.json();
        renderProducts(allProducts);
        document.getElementById('status').textContent = `✅ ${allProducts.length} productos cargados desde FakeStore API`;
      } catch (e) {
        document.getElementById('status').textContent = '❌ Error al cargar productos';
      }
    }

    function filterProducts() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const cat = document.getElementById('categorySelect').value;
      let filtered = allProducts.filter(p => {
        const matchQ = !q || p.title.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
        const matchCat = !cat || p.category === cat;
        return matchQ && matchCat;
      });
      renderProducts(filtered);
      document.getElementById('status').textContent = `${filtered.length} productos encontrados`;
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      if (!products.length) { grid.innerHTML = '<div style="color:#ffd70066">Sin resultados</div>'; return; }
      grid.innerHTML = products.map(p => `
        <div class="product-card" onclick="addToCart(${p.id})">
          <img class="product-img" src="${p.image}" alt="${p.title}" loading="lazy">
          <div class="product-cat">${p.category}</div>
          <div class="product-name">${p.title}</div>
          <div class="product-price">$${p.price.toFixed(2)}</div>
          <div class="product-rating">⭐ ${p.rating.rate} (${p.rating.count} reviews)</div>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const product = allProducts.find(p => p.id === id);
      if (!product) return;
      const existing = cart.find(i => i.id === id);
      if (existing) { existing.qty++; } else { cart.push({ ...product, qty: 1 }); }
      renderCart();
    }

    function renderCart() {
      const cartEl = document.getElementById('cart');
      const items = document.getElementById('cartItems');
      const total = document.getElementById('cartTotal');
      cartEl.style.display = 'block';
      items.innerHTML = cart.map(i => `
        <div class="cart-item">
          <span>${i.title.substring(0, 30)}...</span>
          <span>x${i.qty} — $${(i.price * i.qty).toFixed(2)}</span>
        </div>
      `).join('');
      const sum = cart.reduce((a, i) => a + i.price * i.qty, 0);
      total.textContent = `Total: $${sum.toFixed(2)}`;
    }

    function clearCart() {
      cart = [];
      document.getElementById('cart').style.display = 'none';
    }

    document.getElementById('searchInput').addEventListener('keyup', e => { if (e.key === 'Enter') filterProducts(); });
    loadProducts();
  </script>
</body>
</html>
